syntax = "proto3";

package mpcium.protocol.v1;

option go_package = "github.com/vietddude/mpcium-sdk/protocol;protocol";

enum ProtocolType {
  PROTOCOL_TYPE_UNSPECIFIED = 0;
  PROTOCOL_TYPE_ECDSA = 1;
  PROTOCOL_TYPE_EDDSA = 2;
}

enum OperationType {
  OPERATION_TYPE_UNSPECIFIED = 0;
  OPERATION_TYPE_KEYGEN = 1;
  OPERATION_TYPE_SIGN = 2;
  OPERATION_TYPE_RESHARE = 3;
}

enum ParticipantPhase {
  PARTICIPANT_PHASE_UNSPECIFIED = 0;
  PARTICIPANT_PHASE_CREATED = 1;
  PARTICIPANT_PHASE_JOINING = 2;
  PARTICIPANT_PHASE_READY = 3;
  PARTICIPANT_PHASE_KEY_EXCHANGE = 4;
  PARTICIPANT_PHASE_KEY_EXCHANGE_DONE = 5;
  PARTICIPANT_PHASE_MPC_RUNNING = 6;
  PARTICIPANT_PHASE_COMPLETED = 7;
  PARTICIPANT_PHASE_FAILED = 8;
  PARTICIPANT_PHASE_ABORTED = 9;
}

enum FailureReason {
  FAILURE_REASON_UNSPECIFIED = 0;
  FAILURE_REASON_INVALID_SESSION = 1;
  FAILURE_REASON_INVALID_MESSAGE = 2;
  FAILURE_REASON_INVALID_SIGNATURE = 3;
  FAILURE_REASON_DECRYPT_FAILED = 4;
  FAILURE_REASON_UNSUPPORTED_OPERATION = 5;
  FAILURE_REASON_MISSING_PREREQUISITE = 6;
  FAILURE_REASON_TSS_ERROR = 7;
  FAILURE_REASON_ABORTED = 8;
  FAILURE_REASON_TIMEOUT = 9;
  FAILURE_REASON_REPLAY = 10;
}

message SessionParticipant {
  string participant_id = 1;
  bytes party_key = 2;
}

message NonHardenedDerivation {
  repeated uint32 path = 1;
  bytes delta = 2;
}

message KeygenPayload {
  string key_id = 1;
}

message SignPayload {
  string key_id = 1;
  bytes signing_input = 2;
  NonHardenedDerivation derivation = 3;
}

message ResharePayload {
  string key_id = 1;
  uint32 new_threshold = 2;
  repeated SessionParticipant new_participants = 3;
}

message SessionStart {
  string session_id = 1;
  ProtocolType protocol = 2;
  OperationType operation = 3;
  uint32 threshold = 4;
  repeated SessionParticipant participants = 5;

  oneof payload {
    KeygenPayload keygen = 10;
    SignPayload sign = 11;
    ResharePayload reshare = 12;
  }
}

message KeyExchangeBegin {}

message MpcBegin {}

message SessionAbort {
  FailureReason reason = 1;
  string detail = 2;
}

message ControlMessage {
  string session_id = 1;
  uint64 sequence = 2;
  string coordinator_id = 3;
  bytes signature = 4;

  oneof body {
    SessionStart session_start = 10;
    KeyExchangeBegin key_exchange_begin = 11;
    MpcBegin mpc_begin = 12;
    SessionAbort session_abort = 13;
  }
}

message KeyExchangeHello {
  bytes x25519_public_key = 1;
}

message MpcPacket {
  bytes payload = 1;
  bytes nonce = 2;
}

message PeerMessage {
  string session_id = 1;
  uint64 sequence = 2;
  string from_participant_id = 3;
  string to_participant_id = 4;
  bool broadcast = 5;
  ParticipantPhase phase = 6;
  bytes signature = 7;

  oneof body {
    KeyExchangeHello key_exchange_hello = 10;
    MpcPacket mpc_packet = 11;
  }
}

message KeyShareResult {
  string key_id = 1;
  bytes share_blob = 2;
  bytes public_key = 3;
}

message SignatureResult {
  string key_id = 1;
  bytes signature = 2;
  bytes signature_recovery = 3;
  bytes r = 4;
  bytes s = 5;
  bytes signed_input = 6;
  bytes public_key = 7;
}

message Result {
  oneof body {
    KeyShareResult key_share = 1;
    SignatureResult signature = 2;
  }
}

message PeerJoined {
  string participant_id = 1;
}

message PeerReady {
  string participant_id = 1;
}

message PeerKeyExchangeDone {
  string participant_id = 1;
}

message PeerFailed {
  string participant_id = 1;
  FailureReason reason = 2;
  string detail = 3;
}

message SessionCompleted {
  Result result = 1;
}

message SessionFailed {
  FailureReason reason = 1;
  string detail = 2;
}

message SessionEvent {
  string session_id = 1;
  string participant_id = 2;
  uint64 sequence = 3;

  oneof body {
    PeerJoined peer_joined = 10;
    PeerReady peer_ready = 11;
    PeerKeyExchangeDone peer_key_exchange_done = 12;
    PeerFailed peer_failed = 13;
    SessionCompleted session_completed = 14;
    SessionFailed session_failed = 15;
  }
}
